<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WazuhBot — AI Security Assistant</title>
    <meta
      name="description"
      content="WazuhBot is a Wazuh-themed AI assistant for security operations."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/variables.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="icon" href="/logo.png" type="image/png" />
  </head>
  <body>
    <div class="app" id="app">
      <!-- ===== SIDEBAR ===== -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo-area">
            <img src="/logo.png" alt="Wazuh Logo" class="logo-img" />
            <span class="logo-text">WazuhBot</span>
          </div>
          <button
            class="btn-icon sidebar-close-btn"
            id="sidebarCloseBtn"
            title="Close sidebar"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
        </div>

        <button class="new-chat-btn" id="newChatBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          <span>New Chat</span>
        </button>

        <div class="chat-history" id="chatHistory">
          <div class="chat-history-label">Recent</div>
          <ul class="chat-list" id="chatList">
            <!-- populated by JS -->
          </ul>
        </div>

        <div class="sidebar-footer">
          <button class="settings-btn" id="settingsBtn">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
            <span>Settings</span>
          </button>
        </div>
      </aside>

      <!-- ===== MAIN CHAT AREA ===== -->
      <main class="main" id="main">
        <header class="chat-header">
          <button
            class="btn-icon sidebar-toggle-btn"
            id="sidebarToggleBtn"
            title="Open sidebar"
          >
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <div class="model-selector">
            <span class="model-name">WazuhBot</span>
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </div>
        </header>

        <!-- Welcome / Empty state -->
        <div class="chat-messages" id="chatMessages">
          <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-logo">
              <img src="/logo.png" alt="Wazuh" class="welcome-logo-img" />
            </div>
            <h1 class="welcome-title">How can I help you today?</h1>
            <div class="suggestion-cards">
              <button
                class="suggestion-card"
                data-prompt="Explain what Wazuh is and how it works"
              >
                <div class="suggestion-icon">🛡️</div>
                <div class="suggestion-text">
                  Explain what Wazuh is and how it works
                </div>
              </button>
              <button
                class="suggestion-card"
                data-prompt="How do I set up a Wazuh agent on Ubuntu?"
              >
                <div class="suggestion-icon">🐧</div>
                <div class="suggestion-text">
                  How do I set up a Wazuh agent on Ubuntu?
                </div>
              </button>
              <button
                class="suggestion-card"
                data-prompt="Show me common Wazuh rules for detecting threats"
              >
                <div class="suggestion-icon">📋</div>
                <div class="suggestion-text">
                  Show me common Wazuh rules for detecting threats
                </div>
              </button>
              <button
                class="suggestion-card"
                data-prompt="Help me analyze a security alert from my Wazuh dashboard"
              >
                <div class="suggestion-icon">🔍</div>
                <div class="suggestion-text">
                  Help me analyze a security alert from my dashboard
                </div>
              </button>
            </div>
          </div>
        </div>

        <!-- Input Bar -->
        <div class="input-area">
          <div class="input-container" id="inputContainer">
            <textarea
              class="chat-input"
              id="chatInput"
              placeholder="Message WazuhBot..."
              rows="1"
              aria-label="Chat input"
            ></textarea>
            <button class="send-btn" id="sendBtn" title="Send message" disabled>
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
          <div class="input-footer">
            WazuhBot can make mistakes. Verify important security information.
          </div>
        </div>
      </main>
    </div>

    <!-- ===== SETTINGS MODAL ===== -->
    <div class="modal-overlay" id="settingsModal">
      <div class="modal" role="dialog" aria-label="Settings">
        <div class="modal-header">
          <h2 class="modal-title">Settings</h2>
          <button
            class="btn-icon modal-close-btn"
            id="modalCloseBtn"
            title="Close"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="settings-section">
            <h3 class="settings-section-title">General</h3>
            <div class="settings-row">
              <div class="settings-label">
                <span class="settings-label-text">Theme</span>
                <span class="settings-label-desc"
                  >Choose between light and dark mode</span
                >
              </div>
              <div class="theme-toggle-group">
                <button
                  class="theme-option"
                  data-theme-value="light"
                  id="themeLightBtn"
                >
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                  </svg>
                  Light
                </button>
                <button
                  class="theme-option"
                  data-theme-value="dark"
                  id="themeDarkBtn"
                >
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                  </svg>
                  Dark
                </button>
                <button
                  class="theme-option"
                  data-theme-value="system"
                  id="themeSystemBtn"
                >
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" />
                  </svg>
                  System
                </button>
              </div>
            </div>
          </div>

          <div class="settings-section">
            <h3 class="settings-section-title">Chat</h3>
            <div class="settings-row">
              <div class="settings-label">
                <span class="settings-label-text">Delete all chats</span>
                <span class="settings-label-desc"
                  >Permanently delete all your conversations</span
                >
              </div>
              <button class="btn-danger" id="deleteAllChatsBtn">
                Delete All
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
