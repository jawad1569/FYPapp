<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — WazuhBot</title>
    <meta name="description" content="Create your WazuhBot account" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/variables.css" />
    <link rel="stylesheet" href="/src/styles/auth.css" />
    <link rel="icon" href="/logo.png" type="image/png" />
  </head>
  <body>
    <div class="auth-page">
      <!-- Decorative background -->
      <div class="auth-bg">
        <div class="auth-bg-shape auth-bg-shape--1"></div>
        <div class="auth-bg-shape auth-bg-shape--2"></div>
        <div class="auth-bg-shape auth-bg-shape--3"></div>
      </div>

      <div class="auth-container">
        <!-- Branding -->
        <div class="auth-brand">
          <img src="/logo.png" alt="WazuhBot" class="auth-logo" />
          <h1 class="auth-app-name">WazuhBot</h1>
          <p class="auth-tagline">AI Security Assistant</p>
        </div>

        <!-- Card -->
        <div class="auth-card">
          <h2 class="auth-title">Create your account</h2>
          <p class="auth-subtitle">Get started with WazuhBot in seconds</p>

          <!-- Error toast -->
          <div class="auth-error" id="authError" role="alert"></div>

          <form id="signupForm" class="auth-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="fullName">Full Name <span class="required">*</span></label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="8" r="5" />
                  <path d="M20 21a8 8 0 0 0-16 0" />
                </svg>
                <input
                  type="text"
                  id="fullName"
                  class="form-input"
                  placeholder="John Doe"
                  autocomplete="name"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="email">Email <span class="required">*</span></label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2" />
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                </svg>
                <input
                  type="email"
                  id="email"
                  class="form-input"
                  placeholder="you@example.com"
                  autocomplete="email"
                  required
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="password">Password <span class="required">*</span></label>
                <div class="input-wrapper">
                  <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                  </svg>
                  <input
                    type="password"
                    id="password"
                    class="form-input"
                    placeholder="Min 8 characters"
                    autocomplete="new-password"
                    required
                    minlength="8"
                  />
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm Password <span class="required">*</span></label>
                <div class="input-wrapper">
                  <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                  </svg>
                  <input
                    type="password"
                    id="confirmPassword"
                    class="form-input"
                    placeholder="Repeat password"
                    autocomplete="new-password"
                    required
                  />
                </div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="organization">Organization <span class="optional">(optional)</span></label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
                  <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
                </svg>
                <input
                  type="text"
                  id="organization"
                  class="form-input"
                  placeholder="Your company or team"
                  autocomplete="organization"
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="wazuhIp">Wazuh IP <span class="optional">(optional)</span></label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2" />
                  <rect x="2" y="14" width="20" height="8" rx="2" ry="2" />
                  <line x1="6" y1="6" x2="6.01" y2="6" />
                  <line x1="6" y1="18" x2="6.01" y2="18" />
                </svg>
                <input
                  type="text"
                  id="wazuhIp"
                  class="form-input"
                  placeholder="e.g. 192.168.1.100"
                  autocomplete="off"
                />
              </div>
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">
              <span class="auth-btn-text">Create Account</span>
              <div class="auth-btn-loader" id="btnLoader">
                <div class="spinner"></div>
              </div>
            </button>
          </form>

          <p class="auth-footer-text">
            Already have an account?
            <a href="/login.html" class="auth-link">Sign in</a>
          </p>
        </div>
      </div>
    </div>

    <script type="module" src="/src/js/auth.js"></script>
  </body>
</html>
