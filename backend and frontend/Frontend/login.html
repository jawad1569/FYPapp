<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — WazuhBot</title>
    <meta
      name="description"
      content="Sign in to WazuhBot AI Security Assistant"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/variables.css" />
    <link rel="stylesheet" href="/src/styles/auth.css" />
    <link rel="icon" href="/logo.png" type="image/png" />
  </head>
  <body>
    <div class="auth-page">
      <!-- Decorative background -->
      <div class="auth-bg">
        <div class="auth-bg-shape auth-bg-shape--1"></div>
        <div class="auth-bg-shape auth-bg-shape--2"></div>
        <div class="auth-bg-shape auth-bg-shape--3"></div>
      </div>

      <div class="auth-container">
        <!-- Branding -->
        <div class="auth-brand">
          <img src="/logo.png" alt="WazuhBot" class="auth-logo" />
          <h1 class="auth-app-name">WazuhBot</h1>
          <p class="auth-tagline">AI Security Assistant</p>
        </div>

        <!-- Card -->
        <div class="auth-card">
          <h2 class="auth-title">Welcome back</h2>
          <p class="auth-subtitle">Sign in to continue to WazuhBot</p>

          <!-- Error toast -->
          <div class="auth-error" id="authError" role="alert"></div>

          <form id="loginForm" class="auth-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="2" y="4" width="20" height="16" rx="2" />
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                </svg>
                <input
                  type="email"
                  id="email"
                  class="form-input"
                  placeholder="you@example.com"
                  autocomplete="email"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input
                  type="password"
                  id="password"
                  class="form-input"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                />
                <button
                  type="button"
                  class="toggle-password"
                  id="togglePassword"
                  title="Show password"
                >
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
                    />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">
              <span class="auth-btn-text">Sign In</span>
              <div class="auth-btn-loader" id="btnLoader">
                <div class="spinner"></div>
              </div>
            </button>
          </form>

          <p class="auth-footer-text">
            Don't have an account?
            <a href="/signup.html" class="auth-link">Create one</a>
          </p>
        </div>
      </div>
    </div>

    <script type="module" src="/src/js/auth.js"></script>
  </body>
</html>
