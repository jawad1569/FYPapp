<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify — WazuhBot</title>
    <meta name="description" content="Two-factor authentication for WazuhBot" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/variables.css" />
    <link rel="stylesheet" href="/src/styles/auth.css" />
    <link rel="icon" href="/logo.png" type="image/png" />
  </head>
  <body>
    <div class="auth-page">
      <!-- Decorative background -->
      <div class="auth-bg">
        <div class="auth-bg-shape auth-bg-shape--1"></div>
        <div class="auth-bg-shape auth-bg-shape--2"></div>
        <div class="auth-bg-shape auth-bg-shape--3"></div>
      </div>

      <div class="auth-container">
        <!-- Branding -->
        <div class="auth-brand">
          <img src="/logo.png" alt="WazuhBot" class="auth-logo" />
          <h1 class="auth-app-name">WazuhBot</h1>
          <p class="auth-tagline">AI Security Assistant</p>
        </div>

        <!-- Card -->
        <div class="auth-card">
          <!-- Shield icon -->
          <div class="tfa-icon">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              <path d="m9 12 2 2 4-4" />
            </svg>
          </div>

          <h2 class="auth-title">Two-Factor Authentication</h2>
          <p class="auth-subtitle">
            Enter the 6-digit code from your authenticator app
          </p>

          <!-- Error toast -->
          <div class="auth-error" id="authError" role="alert"></div>

          <form id="tfaForm" class="tfa-form" novalidate>
            <div class="otp-group" role="group" aria-label="One-time code">
              <input
                class="otp-input"
                id="otp-0"
                type="text"
                inputmode="numeric"
                pattern="[0-9]"
                maxlength="1"
                autocomplete="one-time-code"
                aria-label="Digit 1"
              />
              <input
                class="otp-input"
                id="otp-1"
                type="text"
                inputmode="numeric"
                pattern="[0-9]"
                maxlength="1"
                aria-label="Digit 2"
              />
              <input
                class="otp-input"
                id="otp-2"
                type="text"
                inputmode="numeric"
                pattern="[0-9]"
                maxlength="1"
                aria-label="Digit 3"
              />

              <div class="otp-sep" aria-hidden="true">&#8212;</div>

              <input
                class="otp-input"
                id="otp-3"
                type="text"
                inputmode="numeric"
                pattern="[0-9]"
                maxlength="1"
                aria-label="Digit 4"
              />
              <input
                class="otp-input"
                id="otp-4"
                type="text"
                inputmode="numeric"
                pattern="[0-9]"
                maxlength="1"
                aria-label="Digit 5"
              />
              <input
                class="otp-input"
                id="otp-5"
                type="text"
                inputmode="numeric"
                pattern="[0-9]"
                maxlength="1"
                aria-label="Digit 6"
              />
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">
              <span class="auth-btn-text">Verify Code</span>
              <div class="auth-btn-loader" id="btnLoader">
                <div class="spinner"></div>
              </div>
            </button>
          </form>

          <p class="tfa-back-link">
            <a href="/login.html" class="auth-link">← Back to sign in</a>
          </p>
        </div>
      </div>
    </div>

    <script type="module">
      import { initTheme } from '/src/js/theme.js';

      document.addEventListener('DOMContentLoaded', () => {
        initTheme();

        // Guard: must have a token (set right after login/signup)
        if (!localStorage.getItem('wazuhbot-token')) {
          window.location.href = '/login.html';
          return;
        }

        const inputs    = Array.from(document.querySelectorAll('.otp-input'));
        const form      = document.getElementById('tfaForm');
        const submitBtn = document.getElementById('submitBtn');

        // Focus first box on load
        inputs[0].focus();

        inputs.forEach((input, idx) => {
          // Only allow digits
          input.addEventListener('input', (e) => {
            const digit = e.target.value.replace(/\D/g, '');
            e.target.value = digit.slice(-1);

            if (digit) {
              input.classList.add('filled');
              clearErrors();
              if (idx < 5) {
                inputs[idx + 1].focus();
              } else {
                attemptSubmit();
              }
            } else {
              input.classList.remove('filled');
            }
          });

          // Backspace / arrow navigation
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && idx > 0) {
              inputs[idx - 1].value = '';
              inputs[idx - 1].classList.remove('filled');
              inputs[idx - 1].focus();
            }
            if (e.key === 'ArrowLeft'  && idx > 0) inputs[idx - 1].focus();
            if (e.key === 'ArrowRight' && idx < 5) inputs[idx + 1].focus();
          });

          // Paste — distribute digits across boxes
          input.addEventListener('paste', (e) => {
            e.preventDefault();
            const digits = e.clipboardData
              .getData('text')
              .replace(/\D/g, '')
              .slice(0, 6);

            digits.split('').forEach((char, i) => {
              if (inputs[i]) {
                inputs[i].value = char;
                inputs[i].classList.add('filled');
              }
            });

            const nextEmpty = inputs.findIndex(inp => !inp.value);
            if (nextEmpty === -1) {
              inputs[5].focus();
              attemptSubmit();
            } else {
              inputs[nextEmpty].focus();
            }
          });

          // Select content on click (makes replacing a digit easier)
          input.addEventListener('focus', () => input.select());
        });

        function getCode() {
          return inputs.map(i => i.value).join('');
        }

        function clearErrors() {
          inputs.forEach(i => i.classList.remove('error'));
          const err = document.getElementById('authError');
          if (err) { err.textContent = ''; err.classList.remove('visible'); }
        }

        function showError(msg) {
          const err = document.getElementById('authError');
          if (err) { err.textContent = msg; err.classList.add('visible'); }
          inputs.forEach(i => i.classList.add('error'));
          inputs[0].focus();
        }

        async function attemptSubmit() {
          const code = getCode();
          if (code.length < 6) {
            showError('Please enter all 6 digits.');
            return;
          }

          submitBtn.disabled = true;
          submitBtn.classList.add('loading');

          // Brief simulated verification delay
          await new Promise(r => setTimeout(r, 700));

          window.location.href = '/';
        }

        form.addEventListener('submit', (e) => {
          e.preventDefault();
          attemptSubmit();
        });
      });
    </script>
  </body>
</html>
